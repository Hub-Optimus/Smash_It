<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smash_It — Answer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#111827; --muted:#5B6472; --faint:#8A93A3;
  --card:#FFFFFF; --line:#E3E7EC; --line-soft:#EDF0F3;
  --navy:#101623; --teal:#0E7C6B; --teal-deep:#0B6355; --teal-soft:#E5F3F0; --teal-line:#BEE0D8;
  --live:#E5484D; --live-soft:#FDECEC;
  --amber:#B45309; --amber-soft:#FCF3E4;
  --violet:#5B4B9A; --violet-soft:#EFEBFA;
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif; font-size:13.5px; color:var(--ink); background:var(--card);
  -webkit-font-smoothing:antialiased; display:flex; flex-direction:column;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slidein{from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none}}
.head{
  display:flex; align-items:center; gap:6px; padding:7px 12px; background:var(--navy); color:#fff; flex-shrink:0;
}
.wordmark{font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; letter-spacing:.02em}
.wordmark .u{color:var(--teal)}
.livedot{width:6px; height:6px; border-radius:50%; background:#5B6472; margin-left:auto; flex-shrink:0}
.livedot.on{background:#3ECF8E}
.body{flex:1; min-height:0; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column}
.idle{margin:auto; text-align:center; color:var(--faint); font-size:12.5px; line-height:1.6}
.q{font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px; line-height:1.4}
.a{font-size:15px; line-height:1.5; color:var(--ink); animation:slidein .2s ease}
.pending{display:flex; align-items:center; gap:8px; color:var(--muted); font-size:12.5px}
.spin{width:13px; height:13px; border:2px solid var(--line); border-top-color:var(--teal); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0}
.foot{display:flex; align-items:center; gap:5px; flex-wrap:wrap; margin-top:9px}
.chip{font-size:10px; font-weight:600; color:var(--teal-deep); background:var(--teal-soft); border:1px solid var(--teal-line); border-radius:99px; padding:2px 8px}
.basis{font-size:9.5px; font-weight:700; border-radius:99px; padding:2px 8px; margin-left:auto}
.basis.document{background:var(--teal-soft); color:var(--teal-deep)}
.basis.blended{background:var(--amber-soft); color:var(--amber)}
.basis.general{background:var(--violet-soft); color:var(--violet)}
.err{color:var(--live); font-size:13px}
</style>
</head>
<body>
<div class="head">
  <span class="wordmark">SMASH<span class="u">_</span>IT</span>
  <span class="livedot" id="liveDot" title="Connected to the main window"></span>
</div>
<div class="body" id="body">
  <div class="idle" id="idle">Waiting for a question in the meeting…<br><br>Keep the main Smash_It window open — this updates automatically.</div>
</div>

<script>
'use strict';
const bodyEl = document.getElementById('body');
const idleEl = document.getElementById('idle');
const liveDot = document.getElementById('liveDot');

const BASIS_LABEL = { document: '📄 From documents', blended: '📄 Docs + reasoning', general: '💡 General reasoning' };

function render(msg) {
  liveDot.classList.add('on');
  idleEl.style.display = 'none';
  bodyEl.querySelectorAll('.frame').forEach(function (n) { n.remove(); });

  const frame = document.createElement('div');
  frame.className = 'frame';

  const q = document.createElement('div');
  q.className = 'q';
  q.textContent = msg.question || '';
  frame.appendChild(q);

  if (msg.type === 'pending') {
    const p = document.createElement('div');
    p.className = 'pending';
    p.innerHTML = '<span class="spin"></span>Thinking…';
    frame.appendChild(p);
  } else if (msg.type === 'error') {
    const e = document.createElement('div');
    e.className = 'err';
    e.textContent = msg.message || 'Something went wrong.';
    frame.appendChild(e);
  } else if (msg.type === 'answer') {
    const a = document.createElement('div');
    a.className = 'a';
    a.textContent = msg.answer || '';
    frame.appendChild(a);

    const foot = document.createElement('div');
    foot.className = 'foot';
    (msg.sources || []).forEach(function (s) {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = '📄 ' + s;
      foot.appendChild(chip);
    });
    const basis = document.createElement('span');
    basis.className = 'basis ' + msg.basis;
    basis.textContent = BASIS_LABEL[msg.basis] || '';
    foot.appendChild(basis);
    frame.appendChild(foot);
  }

  bodyEl.appendChild(frame);
}

if ('BroadcastChannel' in window) {
  const channel = new BroadcastChannel('smashit_answer');
  channel.onmessage = function (event) { render(event.data); };
} else {
  idleEl.textContent = 'Your browser does not support live updates here. Use Chrome or Edge.';
}
</script>
</body>
</html>
